<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — NetIncidents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,.3);
    }
    .brand-logo {
      width: 60px; height: 60px; background: #dd9103;
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; font-size: 1.8rem; color: #fff; margin: 0 auto 1rem;
    }
    .form-control {
      border-radius: 10px; padding: .75rem 1rem;
      border: 1.5px solid #e2e8f0; transition: all .2s;
    }
    .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .btn-login {
      background: #3b82f6; border: none; border-radius: 10px;
      padding: .8rem; font-weight: 600; font-size: 1rem; transition: all .2s;
    }
    .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); }
    .input-icon { position: relative; }
    .input-icon .bi { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .input-icon .form-control { padding-left: 2.75rem; }
    .network-dot {
      position: fixed; border-radius: 50%; background: rgba(59,130,246,.15);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.1);opacity:.8} }
  </style>
</head>
<body>
  <!-- Décoration fond -->
  <div class="network-dot" style="width:300px;height:300px;top:-80px;left:-80px;animation-delay:0s"></div>
  <div class="network-dot" style="width:200px;height:200px;bottom:-40px;right:-40px;animation-delay:2s"></div>

  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-logo"><i class="bi bi-wifi"></i></div>
      <h4 class="fw-bold mb-1">NetIncidents</h4>
      <p class="text-muted small">Système de gestion d'incidents réseaux</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger alert-sm py-2 small mb-3">
      <i class="bi bi-exclamation-circle me-2"></i>Identifiants incorrects. Veuillez réessayer.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-500 small">Nom d'utilisateur</label>
        <div class="input-icon">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" placeholder="Votre identifiant" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-500 small">Mot de passe</label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 text-white">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>

    <div class="text-center mt-4 text-muted small">
      <i class="bi bi-shield-lock me-1"></i>Accès réservé au personnel autorisé
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
